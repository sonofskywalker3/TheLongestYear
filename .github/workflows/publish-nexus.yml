name: Publish to Nexus Mods

# Auto-uploads the release zip to Nexus mod 47192 whenever a GitHub release is
# published. Mirrors AndroidConsolizer's pipeline. The mod DESCRIPTION, mod-level
# version field, and per-version changelog are NOT set here (the Nexus API has no
# mutations for them) — see docs/RELEASE_TOOLING.md for those steps.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.9.5). Leave empty for latest release.'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Determine release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(gh release view --json tagName -q '.tagName' --repo "$GITHUB_REPOSITORY")
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Strip leading 'v' for the Nexus version string.
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download release asset
        run: |
          gh release download "${{ steps.release.outputs.tag }}" \
            --pattern '*.zip' --dir . --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Find ZIP file
        id: zip
        run: |
          ZIP=$(ls *.zip | head -1)
          echo "path=$ZIP" >> $GITHUB_OUTPUT
          echo "Found: $ZIP"

      # PINNED to the v3-migration merge commit (2026-06-17, "Migrate to
      # createModFileVersion", = post-migration main as of 2026-07-13). Verified
      # via the read-only nexus-v3-probe workflow: the v3 mod-file id equals our
      # old file_group_id (Nexus migrated update groups into v3 mod files; the
      # legacy per-version fileId 174860 is NOT it). Rollback if a release fails:
      # pre-migration pin ee1af4be8e1be6773ab5aeb02bacc6d638b20deb with
      # file_group_id/file_category/archive_existing_file — live until 2026-09-09.
      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@f6e1e2ea683dfe8f88cccf642c6e0e69ab66825e
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          # v3 mod-file id (NOT mod ID 47192, NOT a per-version fileId). Confirmed
          # by GET /v3/mods/5596342433880/files — the mod's single active file.
          # Stays stable across version updates; versions attach to it.
          file_id: 7502657
          filename: ${{ steps.zip.outputs.path }}
          # Clean display name; without this the action appends ".zip" to the raw
          # filename (e.g. "TheLongestYear.0.9.5.zip.zip").
          display_name: The Longest Year ${{ steps.release.outputs.version }}
          version: ${{ steps.release.outputs.version }}
          category: main
          archive_existing_version: true
